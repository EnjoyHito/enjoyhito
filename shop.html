<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — ENJOYHITO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">ENJOYHITO</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html" class="active">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    </div>
  </nav>

  <section class="page-header">
    <h1>The Collection</h1>
    <p>Made-to-order. Shipped worldwide.</p>
  </section>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="container">
      <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
      <button class="filter-btn" onclick="filterProducts('Hats', this)">Hats</button>
      <button class="filter-btn" onclick="filterProducts('Apparel', this)">Apparel</button>
      <button class="filter-btn" onclick="filterProducts('Accessories', this)">Accessories</button>
    </div>
  </div>

  <section class="section">
    <div class="container">
      <div class="product-grid" id="shop-grid"></div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">ENJOYHITO</p>
      <p class="footer-tagline">Premium. Intentional. Yours.</p>
      <div class="footer-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2025 Enjoyhito. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/products.js"></script>
  <script>
    let currentFilter = 'all';

    function renderProducts(filter) {
      const grid = document.getElementById('shop-grid');
      const list = filter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === filter);
      grid.innerHTML = '';
      list.forEach(p => {
        grid.innerHTML += `
          <div class="product-card">
            <div class="product-img-wrap">
              <img src="${p.image}" alt="${p.name}" onerror="this.src='images/placeholder.jpg'" />
            </div>
            <div class="product-info">
              <p class="product-cat">${p.category}</p>
              <h3 class="product-name">${p.name}</h3>
              <p class="product-price">$${p.price}</p>
              <a href="${p.buyLink}" target="_blank" class="btn-primary btn-sm">Buy Now</a>
            </div>
          </div>`;
      });
    }

    function filterProducts(cat, btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts(cat);
    }

    renderProducts('all');
  </script>
</body>
</html>
