<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — ENJOYHITO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a href="index.html" class="logo">ENJOYHITO</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
      <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')">☰</button>
    </div>
  </nav>

  <section class="page-header">
    <h1>Get in Touch</h1>
    <p>We'd love to hear from you.</p>
  </section>

  <section class="section">
    <div class="container container-narrow">
      <!--
        ✏️ EDIT: Replace the action URL below with your Formspree URL.
        Sign up free at https://formspree.io to receive email from this form.
      -->
      <form class="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required />
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="What's on your mind?" required></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message</button>
      </form>

      <!-- ✏️ EDIT: Update your email below -->
      <p class="contact-alt">Or email us directly at <a href="mailto:hello@enjoyhito.com">hello@enjoyhito.com</a></p>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer-logo">ENJOYHITO</p>
      <p class="footer-tagline">Premium. Intentional. Yours.</p>
      <div class="footer-links">
        <a href="shop.html">Shop</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </div>
      <p class="footer-copy">&copy; 2025 Enjoyhito. All rights reserved.</p>
    </div>
  </footer>

</body>
</html>
